<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders - FetchKart</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Review Modal -->
    <div id="review-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Write a Review</h3>
        <form id="review-form" onsubmit="submitReview(event)">
          <input type="hidden" name="product_id" id="review-product-id" />
          <div
            class="rating-stars"
            style="font-size: 2rem; margin: 1.5rem 0; color: #f59e0b"
          >
            <i class="far fa-star" data-rating="1"></i>
            <i class="far fa-star" data-rating="2"></i>
            <i class="far fa-star" data-rating="3"></i>
            <i class="far fa-star" data-rating="4"></i>
            <i class="far fa-star" data-rating="5"></i>
          </div>
          <input type="hidden" name="rating" id="review-rating" value="0" />
          <div class="form-group">
            <textarea
              name="review_text"
              placeholder="Share your experience with this product..."
              style="min-height: 120px"
              required
            ></textarea>
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
            <button type="submit" class="btn btn-primary" style="flex: 1">
              Submit Review
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeReviewModal()"
              style="flex: 1"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Coming Soon Modal -->
    <div id="coming-soon-modal" class="modal-overlay">
      <div class="modal-content" style="text-align: center; max-width: 400px; padding: 3rem;">
        <div style="font-size: 4rem; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px rgba(79, 70, 229, 0.4));">🚀</div>
        <h2 style="margin-bottom: 1rem; font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #818cf8); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Coming Soon!</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6;">
          Our Return & Replace feature is currently under development to provide you with the best experience.
        </p>
        <button class="btn btn-primary" onclick="closeComingSoonModal()" style="width: 100%; padding: 1rem; border-radius: 12px; font-weight: 700; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);">
          Understood
        </button>
      </div>
    </div>
    <header>
      <a href="index.html" class="logo">FetchKart</a>
      <nav id="main-nav">
        <!-- Dynamic content from auth.js -->
      </nav>
    </header>

    <main>
      <h1 class="page-title">My Orders</h1>
      <div id="orders-container" class="orders-list">
        <p>Loading your orders...</p>
      </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
  </body>
</html>
