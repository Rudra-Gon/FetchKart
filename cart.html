<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - FetchKart</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">FetchKart</a>
      <nav id="main-nav">
        <!-- Dynamic content from auth.js -->
        <a href="index.html">Shop</a>
        <a href="cart.html"
          >Cart <span class="cart-count" id="cart-counter">0</span></a
        >
        <button id="theme-btn" class="theme-toggle" onclick="themeToggle()">
          🌙
        </button>
      </nav>
    </header>

    <main>
      <h1 class="page-title">Shopping Cart</h1>

      <div class="cart-container" id="cart-container">
        <p>Loading cart...</p>
      </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
      // Load cart items when on cart page
      document.addEventListener("DOMContentLoaded", loadCartPage);
    </script>
  </body>
</html>
