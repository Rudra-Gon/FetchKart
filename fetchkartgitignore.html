<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FK_DEVLAB</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

:root{
    --bg:#050505;
    --green:#00ff9c;
    --darkgreen:#00aa66;
    --red:#ff3c6a;
    --yellow:#ffe066;
    --blue:#00cfff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--green);
    font-family:'JetBrains Mono', monospace;
    overflow:hidden;
    height:100vh;
}

/* CRT EFFECT */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:999;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.15);
    pointer-events:none;
    animation:flicker .15s infinite;
    z-index:999;
}

@keyframes flicker{
    0%{opacity:.12;}
    50%{opacity:.18;}
    100%{opacity:.12;}
}

/* MATRIX */

#matrix{
    position:fixed;
    inset:0;
    z-index:0;
}

/* MAIN UI */

.container{
    position:relative;
    z-index:5;
    width:min(1100px,92%);
    margin:auto;
    margin-top:40px;
    height:calc(100vh - 80px);
    border:1px solid rgba(0,255,156,0.3);
    background:rgba(0,0,0,0.72);
    backdrop-filter:blur(12px);
    box-shadow:
        0 0 30px rgba(0,255,156,0.15),
        inset 0 0 20px rgba(0,255,156,0.08);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */

.header{
    padding:18px 24px;
    border-bottom:1px solid rgba(0,255,156,0.25);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,255,156,0.03);
}

.logo{
    font-size:1rem;
    font-weight:700;
    letter-spacing:2px;
}

.status{
    color:var(--yellow);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        opacity:.5;
    }
}

/* BOOT SCREEN */

.boot{
    padding:25px;
    flex:1;
    overflow-y:auto;
    font-size:.95rem;
    line-height:1.7;
}

.line{
    opacity:0;
    transform:translateY(5px);
    animation:show .4s forwards;
}

@keyframes show{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.green{ color:var(--green); }
.red{ color:var(--red); }
.blue{ color:var(--blue); }
.yellow{ color:var(--yellow); }

.hidden{
    display:none;
}

/* TERMINAL */

.terminal{
    border-top:1px solid rgba(0,255,156,0.25);
    padding:15px 20px;
    background:#000;
}

.terminal-output{
    max-height:250px;
    overflow-y:auto;
    margin-bottom:10px;
    line-height:1.6;
    font-size:.92rem;
}

.input-line{
    display:flex;
    align-items:center;
    gap:10px;
}

.prompt{
    color:var(--green);
}

input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--green);
    font-family:inherit;
    font-size:1rem;
}

/* SECRET CARD */

.secret-panel{
    margin-top:20px;
    border:1px solid rgba(255,255,255,0.12);
    padding:15px;
    background:rgba(255,255,255,0.03);
    animation:glitch 1s infinite alternate;
}

@keyframes glitch{
    0%{
        transform:translate(0);
    }
    20%{
        transform:translate(-1px,1px);
    }
    40%{
        transform:translate(1px,-1px);
    }
    100%{
        transform:translate(0);
    }
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:15px;
}

.card{
    border:1px solid rgba(0,255,156,0.2);
    padding:14px;
    background:rgba(0,255,156,0.03);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 15px rgba(0,255,156,0.15);
}

.footer{
    margin-top:25px;
    opacity:.6;
    font-size:.8rem;
}

/* ACCESS GRANTED */

.access{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:4rem;
    z-index:99999;
    color:var(--green);
    letter-spacing:10px;
    animation:flash .8s infinite;
    display:none;
}

@keyframes flash{
    50%{
        opacity:.2;
    }
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:var(--green);
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="access" id="accessScreen">
ACCESS GRANTED
</div>

<div class="container">

    <div class="header">
        <div class="logo">
            FETCHKART_INTERNAL_DEVLAB_v0.1_ALPHA
        </div>

        <div class="status">
            SECURE NODE ACTIVE
        </div>
    </div>

    <div class="boot" id="boot"></div>

    <div class="terminal hidden" id="terminal">

        <div class="terminal-output" id="output"></div>

        <div class="input-line">
            <span class="prompt">fk-root ></span>
            <input type="text" id="commandInput" autocomplete="off" autofocus />
        </div>

    </div>

</div>

<script>

/* ================= MATRIX ================= */

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "FETCHKART<>/[]{}01$#";
const letters = chars.split("");

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let x=0;x<columns;x++){
    drops[x]=1;
}

function drawMatrix(){

    ctx.fillStyle="rgba(0,0,0,0.06)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff9c";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text = letters[Math.floor(Math.random()*letters.length)];

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix,35);

window.addEventListener('resize',()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

/* ================= BOOT ================= */

const boot = document.getElementById('boot');

const bootLines = [
    '[BOOT_SEQUENCE_INITIALIZED]',
    'Loading FetchKart core modules...',
    'Connecting to encrypted inventory nodes...',
    'Verifying product database integrity...',
    'Checking administrator permissions...',
    'WARNING: Unauthorized visitor detected.',
    'Assigning temporary guest token...',
    'Access level: LIMITED',
    'Scanning session fingerprints...',
    'Connection stable.',
    '',
    'Welcome to the hidden layer.',
    'Type "help" to begin.'
];

let delay = 0;

bootLines.forEach((line,index)=>{

    const div = document.createElement('div');
    div.classList.add('line');

    if(line.includes('WARNING')){
        div.classList.add('red');
    }

    if(line.includes('LIMITED')){
        div.classList.add('yellow');
    }

    div.textContent = '> ' + line;

    div.style.animationDelay = `${delay}s`;

    boot.appendChild(div);

    delay += 0.35;
});

setTimeout(()=>{
    document.getElementById('terminal').classList.remove('hidden');
}, delay * 1000 + 400);

/* ================= TERMINAL ================= */

const input = document.getElementById('commandInput');
const output = document.getElementById('output');

const commands = {

help: `
AVAILABLE COMMANDS

help
whoami
status
inventory
launch
sudo
clear
decrypt
override
credits
pong
exit
`,

whoami: `
guest_user_392
STATUS: curiosity detected
`,

status: `
SERVER STATUS: STABLE
PRODUCT NODES: 128 ONLINE
THREAT LEVEL: LOW
REALITY STABILITY: QUESTIONABLE
`,

inventory: `
[CLASSIFIED PRODUCTS]

• Quantum Cart
  delivers before checkout

• Banana RTX 9090
  powered by potassium

• Infinite Coupon
  permanently illegal

• FetchKart AI
  emotionally unstable
`,

launch: `
Launching experimental module...

ERROR:
module escaped containment.
`,

sudo: `
nice try :)
`,

decrypt: `
Decrypting hidden archive...

ACCESS KEY FOUND:
FK-7X-ALPHA
`,

override: `
ROOT ACCESS GRANTED.
WELCOME, DEVELOPER.
`,

credits: `
Built by Rudra

FetchKart Internal Dev Build
v0.0.1-alpha

"if you're reading this,
you found the rabbit hole."
`,

pong: `
Launching Pong.exe...
`,

exit: `
There is no exit.
`
};

function addOutput(text){

    const div = document.createElement('div');

    div.innerHTML = text.replace(/\n/g,'<br>');

    output.appendChild(div);

    output.scrollTop = output.scrollHeight;
}

input.addEventListener('keydown',(e)=>{

    if(e.key === 'Enter'){

        const cmd = input.value.trim().toLowerCase();

        addOutput(`
        <span class="green">fk-root ></span> ${cmd}
        `);

        if(cmd === 'clear'){
            output.innerHTML='';
        }

        else if(commands[cmd]){

            addOutput(commands[cmd]);

            if(cmd === 'pong'){
                setTimeout(()=>{
                    startPong();
                },500);
            }
        }

        else{
            addOutput(`
            COMMAND NOT FOUND

            type "help"
            `);
        }

        if(cmd === 'override'){

            document.getElementById('accessScreen').style.display='flex';

            setTimeout(()=>{
                document.getElementById('accessScreen').style.display='none';

                addOutput(`
                <div class="secret-panel">

                <span class="yellow">
                CLASSIFIED INVENTORY UNLOCKED
                </span>

                <div class="products">

                    <div class="card">
                        <h3>Quantum Cart</h3>
                        <p>Delivers products before checkout.</p>
                    </div>

                    <div class="card">
                        <h3>Infinite Coupon</h3>
                        <p>Breaks several economic laws.</p>
                    </div>

                    <div class="card">
                        <h3>Banana RTX 9090</h3>
                        <p>Runs entirely on potassium.</p>
                    </div>

                    <div class="card">
                        <h3>FetchKart AI</h3>
                        <p>Currently plotting something.</p>
                    </div>

                </div>

                <div class="footer">
                INTERNAL NOTE:
                this page is intentionally hidden from public routing.
                </div>

                </div>
                `);

            },2000);
        }

        input.value='';
    }
});

/* ================= PONG GAME ================= */

const pongOverlay = document.createElement('div');

pongOverlay.style.position = 'fixed';
pongOverlay.style.inset = '0';
pongOverlay.style.background = 'rgba(0,0,0,0.95)';
pongOverlay.style.zIndex = '999999';
pongOverlay.style.display = 'none';
pongOverlay.style.alignItems = 'center';
pongOverlay.style.justifyContent = 'center';
pongOverlay.style.flexDirection = 'column';

pongOverlay.innerHTML = `
<canvas id="pongCanvas" width="900" height="500"
style="
border:2px solid #00ff9c;
box-shadow:0 0 30px rgba(0,255,156,0.3);
background:black;
"></canvas>

<div style="
margin-top:15px;
color:#00ff9c;
font-family:monospace;
">
W/S = MOVE • ESC = EXIT
</div>
`;

document.body.appendChild(pongOverlay);

const pongCanvas = pongOverlay.querySelector('#pongCanvas');
const pctx = pongCanvas.getContext('2d');

let pongRunning = false;

const paddleWidth = 12;
const paddleHeight = 100;

let leftPaddle = {
    x:20,
    y:200,
    width:paddleWidth,
    height:paddleHeight,
    speed:7
};

let rightPaddle = {
    x:pongCanvas.width - 32,
    y:200,
    width:paddleWidth,
    height:paddleHeight,
    speed:5
};

let ball = {
    x:pongCanvas.width/2,
    y:pongCanvas.height/2,
    radius:10,
    speedX:5,
    speedY:5
};

let playerScore = 0;
let aiScore = 0;

const pongKeys = {};

window.addEventListener('keydown',(e)=>{
    pongKeys[e.key.toLowerCase()] = true;

    if(e.key === 'Escape'){
        stopPong();
    }
});

window.addEventListener('keyup',(e)=>{
    pongKeys[e.key.toLowerCase()] = false;
});

function startPong(){

    pongOverlay.style.display = 'flex';

    pongRunning = true;

    resetBall();

    requestAnimationFrame(updatePong);
}

function stopPong(){

    pongRunning = false;

    pongOverlay.style.display = 'none';
}

function resetBall(){

    ball.x = pongCanvas.width/2;
    ball.y = pongCanvas.height/2;

    ball.speedX = (Math.random() > 0.5 ? 5 : -5);
    ball.speedY = (Math.random() > 0.5 ? 5 : -5);
}

function drawRect(x,y,w,h){
    pctx.fillStyle = '#00ff9c';
    pctx.fillRect(x,y,w,h);
}

function drawBall(){

    pctx.beginPath();
    pctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
    pctx.fillStyle = '#00ff9c';
    pctx.fill();
}

function drawCenterLine(){

    for(let i=0;i<pongCanvas.height;i+=30){

        pctx.fillStyle='rgba(0,255,156,0.3)';
        pctx.fillRect(
            pongCanvas.width/2 - 2,
            i,
            4,
            18
        );
    }
}

function updatePong(){

    if(!pongRunning) return;

    pctx.clearRect(0,0,pongCanvas.width,pongCanvas.height);

    if(pongKeys['w']){
        leftPaddle.y -= leftPaddle.speed;
    }

    if(pongKeys['s']){
        leftPaddle.y += leftPaddle.speed;
    }

    if(ball.y < rightPaddle.y + rightPaddle.height/2){
        rightPaddle.y -= rightPaddle.speed;
    }

    if(ball.y > rightPaddle.y + rightPaddle.height/2){
        rightPaddle.y += rightPaddle.speed;
    }

    ball.x += ball.speedX;
    ball.y += ball.speedY;

    if(ball.y <= 0 || ball.y >= pongCanvas.height){
        ball.speedY *= -1;
    }

    if(
        ball.x - ball.radius < leftPaddle.x + leftPaddle.width &&
        ball.y > leftPaddle.y &&
        ball.y < leftPaddle.y + leftPaddle.height
    ){
        ball.speedX *= -1.05;
    }

    if(
        ball.x + ball.radius > rightPaddle.x &&
        ball.y > rightPaddle.y &&
        ball.y < rightPaddle.y + rightPaddle.height
    ){
        ball.speedX *= -1.05;
    }

    if(ball.x < 0){
        aiScore++;
        resetBall();
    }

    if(ball.x > pongCanvas.width){
        playerScore++;
        resetBall();
    }

    drawCenterLine();

    drawRect(
        leftPaddle.x,
        leftPaddle.y,
        leftPaddle.width,
        leftPaddle.height
    );

    drawRect(
        rightPaddle.x,
        rightPaddle.y,
        rightPaddle.width,
        rightPaddle.height
    );

    drawBall();

    pctx.font = '40px monospace';
    pctx.fillStyle = '#00ff9c';

    pctx.fillText(
        playerScore,
        pongCanvas.width/2 - 80,
        60
    );

    pctx.fillText(
        aiScore,
        pongCanvas.width/2 + 50,
        60
    );

    requestAnimationFrame(updatePong);
}

/* ================= KONAMI CODE ================= */

let keys = [];

const secret = [
'ArrowUp',
'ArrowUp',
'ArrowDown',
'ArrowDown',
'ArrowLeft',
'ArrowRight',
'ArrowLeft',
'ArrowRight',
'b',
'a'
];

window.addEventListener('keydown',(e)=>{

    keys.push(e.key);

    keys.splice(-secret.length - 1, keys.length - secret.length);

    if(keys.join('').toLowerCase() === secret.join('').toLowerCase()){

        document.body.style.background='#120018';

        addOutput(`
        <span class="blue">
        KONAMI OVERRIDE DETECTED
        </span>

        RARE MODE ENABLED.
        `);

        document.querySelector('.status').textContent='GODMODE ENABLED';
    }
});

</script>

</body>
</html>
