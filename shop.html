<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - FetchKart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">FetchKart</a>
    <nav id="main-nav">
        <!-- Dynamic content from auth.js -->
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart <span class="cart-count" id="cart-counter">0</span></a>
        <button id="theme-btn" class="theme-toggle" onclick="themeToggle()">🌙</button>
    </nav>
</header>

<main>
    <div class="search-filter-container">
        <div class="search-box">
            <input type="text" id="product-search" placeholder="Search products by name or category..." onkeyup="filterProducts()">
            <span class="search-icon">🔍</span>
        </div>
        <div class="filter-box">
            <select id="category-filter" onchange="filterProducts()">
                <option value="all">All Categories</option>
                <option value="Mobiles">Mobiles</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home">Home</option>
                <option value="Beauty">Beauty</option>
                <option value="Appliances">Appliances</option>
                <option value="Health">Health</option>
                <option value="Toys">Toys</option>
                <option value="Gifting">Gifting</option>
                <option value="Groceries">Groceries</option>
                <option value="Books">Books</option>
                <option value="Sports">Sports</option>
                <option value="Automotive">Automotive</option>
            </select>
        </div>
    </div>
    
    <div id="alert-container"></div>

    <div class="products" id="products-container">
        <!-- Products will be loaded here via JS -->
        <p>Loading products...</p>
    </div>
</main>

<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
