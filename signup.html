<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - FetchKart</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">FetchKart</a>
    <nav>
        <!-- Nav content will be loaded by auth.js -->
    </nav>
</header>

<main>
    <div class="auth-container">
        <h1 class="page-title">Signup</h1>
        <form onsubmit="handleSignup(event)" enctype="multipart/form-data">
            <div class="profile-pic-setup" style="text-align: center; margin-bottom: 2rem;">
                <div class="profile-img-container" onclick="document.getElementById('signup-pic-input').click()" style="width: 100px; height: 100px; margin: 0 auto; position: relative; cursor: pointer;">
                    <img id="signup-profile-preview" src="assets/default-avatar.png" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary);">
                    <div class="img-edit-btn" style="width: 30px; height: 30px; border-width: 2px;">
                        <i class="fas fa-camera" style="font-size: 0.8rem;"></i>
                    </div>
                    <input type="file" id="signup-pic-input" name="profile_pic" hidden accept="image/*" onchange="previewSignupPic(this)">
                </div>
                <p class="text-muted" style="font-size: 0.8rem; margin-top: 0.5rem;">Choose a profile picture</p>
            </div>

            <script>
                function previewSignupPic(input) {
                    if (input.files && input.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            document.getElementById('signup-profile-preview').src = e.target.result;
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                }
            </script>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>I want to be a:</label>
                <select name="role" id="role-select" onchange="toggleSellerOptions()">
                    <option value="customer">Customer (Buy items)</option>
                    <option value="seller">Seller (Sell items)</option>
                    <!-- 
                    added logistics options during signing up process
                    -->
                </select>
            </div>
            
            <div id="seller-options" style="display: none; background: var(--background); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px dashed var(--primary);">
                <h4 style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--primary);">Seller Preferences</h4>
                <div class="form-group">
                    <label>Warehouse Management</label>
                    <select name="warehouse_option">
                        <option value="service">FetchKart Service</option>
                        <option value="personal">Personal Warehouse</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Delivery Method</label>
                    <select name="delivery_option">
                        <option value="service">FetchKart Logistics</option>
                        <option value="personal">Personal Delivery</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Storage Type</label>
                    <select name="storage_option">
                        <option value="service">Standard (Service)</option>
                        <option value="cold storage">Cold Storage (Service)</option>
                        <option value="fragile">Fragile Items (Service)</option>
                        <option value="personal">personal storage</option>
                    </select>
                </div>
            </div>

            <script>
                function toggleSellerOptions() {
                    const role = document.getElementById('role-select').value;
                    document.getElementById('seller-options').style.display = (role === 'seller') ? 'block' : 'none';
                }
            </script>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p id="auth-message"></p>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
</main>

<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
