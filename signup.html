<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - FetchKart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">FetchKart</a>
    <nav>
        <!-- Nav content will be loaded by auth.js -->
    </nav>
</header>

<main>
    <div class="auth-container">
        <h1 class="page-title">Signup</h1>
        <form onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>I want to be a:</label>
                <select name="role">
                    <option value="customer">Customer (Buy items)</option>
                    <option value="seller">Seller (Sell items)</option>
                </select>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p id="auth-message"></p>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
</main>

<script src="js/auth.js"></script>
</body>
</html>
